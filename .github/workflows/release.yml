name: Release

on:
  push:
    tags:
      - 'v*' # Trigger condition: when pushing tags like v0.5.1, v1.0.0, etc.

permissions:
  contents: write # Required: allows the workflow to write to GitHub Releases and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository (fetch-depth: 0 is required for GoReleaser to retrieve full git history for Release Notes)
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      # 2. Set up Go compilation environment
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.4' # Keep this at or higher than your current Go version
          cache: true          # Enable caching to speed up dependency downloads

      # 3. Run GoReleaser to complete automated release
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically generated by GitHub, no manual configuration required
